apiVersion: batch/v1
kind: Job
metadata:
  name: synapse-db-init
  namespace: r16a-chat
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: "postgres.r16a-databases.svc.cluster.local"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-admin
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-admin
                  key: password
            - name: SYNAPSE_PW
              valueFrom:
                secretKeyRef:
                  name: synapse-db
                  key: password
          command: [ "sh", "-c", "psql -v synapse_password=\"$SYNAPSE_PW\" -f /sql/init.sql" ]
          volumeMounts:
            - name: init-sql
              mountPath: /sql
      volumes:
        - name: init-sql
          configMap:
            name: synapse-db-init-sql