apiVersion: v1
kind: ConfigMap
metadata:
  name: synapse-db-init-sql
  namespace: r16a-chat
data:
  init.sql: |
    \getenv synapse_password SYNAPSE_PW

    SELECT format('CREATE USER synapse WITH PASSWORD %L', :'synapse_password')
        WHERE NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'synapse')
        \gexec

    ALTER USER synapse WITH PASSWORD :'synapse_password';

    SELECT 'CREATE DATABASE synapse
      ENCODING ''UTF8''
      LC_COLLATE ''C''
      LC_CTYPE ''C''
      TEMPLATE template0
      OWNER synapse'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'synapse')\gexec